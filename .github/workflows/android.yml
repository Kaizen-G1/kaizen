name: Android Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.R_ACCESS_TOKEN }}

      - name: Build Android App
        env:
          API_URL_PRODUCTION: ${{ secrets.API_URL_PRODUCTION }}
          DEBUG_MODE_PRODUCTION: ${{ secrets.DEBUG_MODE_PRODUCTION }}
          NODE_ENV: production
        run: export API_URL_PRODUCTION="$API_URL_PRODUCTION" && export DEBUG_MODE_PRODUCTION="$DEBUG_MODE_PRODUCTION" && eas build -p android --profile production --non-interactive

      - name: Get Android Build URL
        id: get_build_url
        run: |
          BUILD_URL=$(eas build:list --platform android --status finished --non-interactive --json | jq -r '.[0].artifacts.buildUrl')
          echo "::set-output name=url::$BUILD_URL"

      - name: Download APK from EAS
        run: |
          if [[ -z "${{ steps.get_build_url.outputs.url }}" ]]; then
            echo "Error: No build URL found. Exiting."
            exit 1
          fi
          echo "Downloading APK from: ${{ steps.get_build_url.outputs.url }}"
          mkdir -p builds
          curl -L -o builds/app-release.apk "${{ steps.get_build_url.outputs.url }}" # -L follows redirects

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-artifact
          path: builds/app-release.apk

  deploy:
    name: Deploy to Firebase App Distribution
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-artifact
          path: builds

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Check APK File
        run: ls -lh builds/app-release.apk
        
      - name: Upload to Firebase App Distribution (Android)
        uses: wzieba/Firebase-Distribution-Github-Action@v1.5.1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
          groups: testers
          file: builds/app-release.apk
