name: CI/CD - Expo Build and Deploy to Firebase

on:
  push:
    branches:
      - main  # Running automatically when there is a merge to main
  workflow_dispatch:  # Allowing to manually run the workflow on any branch

jobs:
  build:
    name: Build Android & iOS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.R_ACCESS_TOKEN }}

      - name: Install Expo CLI & EAS
        run: npm install -g expo-cli eas-cli

      - name: Debug Environment Variables
        run: env | grep EAS_ACCESS_TOKEN || echo "Token not found"

      - name: Authenticate with Expo
        run: eas whoami
        env:
          EAS_ACCESS_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Set Expo Token
        run: echo "EAS_ACCESS_TOKEN=${{ secrets.EXPO_TOKEN }}" >> $GITHUB_ENV

      - name: Build Android App
        run: eas build --platform android --profile production --non-interactive
        env:
          EAS_ACCESS_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS App (Simulator)
        run: eas build --platform ios --profile development --non-interactive
        env:
          EAS_ACCESS_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: .
          retention-days: 5

  deploy:
    name: Deploy to Firebase App Distribution
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Authenticate with Firebase
        run: echo '${{ secrets.FIREBASE_TOKEN }}' | firebase login:ci --interactive=false

      - name: Upload to Firebase App Distribution (Android)
        run: firebase appdistribution:distribute *.apk \
          --app ${{ secrets.FIREBASE_APP_ID_ANDROID }} \
          --groups testers \
          --token ${{ secrets.FIREBASE_TOKEN }}

      - name: Upload to Firebase App Distribution (iOS)
        run: firebase appdistribution:distribute *.ipa \
          --app ${{ secrets.FIREBASE_APP_ID_IOS }} \
          --groups testers \
          --token ${{ secrets.FIREBASE_TOKEN }}

